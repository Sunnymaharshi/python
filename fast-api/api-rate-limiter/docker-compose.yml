services:
  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: rate-limiter-api
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      DEBUG: "false"
      DEFAULT_REQUESTS: 100
      DEFAULT_WINDOW_SECONDS: 60
      DEFAULT_ALGORITHM: token_bucket
      METRICS_ENABLED: "true"
    depends_on:
      redis:
        condition: service_healthy # wait for Redis to be ready before starting
    restart: unless-stopped
    networks:
      - rate-limiter-net

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: rate-limiter-redis
    ports:
      - "6379:6379" # expose locally so you can use redis-cli for debugging
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - rate-limiter-net

volumes:
  redis-data:

networks:
  rate-limiter-net:
    driver: bridge
